<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="英语文章学习工具 - 阅读模式与学习模式，音标对齐、长难句分析、核心词汇">
    <title>English Study</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=4">
</head>

<body class="mode-reading">
    <!-- 顶部导航栏 -->
    <header id="app-header">
        <div class="header-left">
            <h1 id="article-title">English Study</h1>
        </div>
        <div class="header-center">
            <div class="mode-switch" id="mode-switch">
                <button class="mode-btn active" data-mode="reading" id="btn-reading">
                    <span class="mode-icon">📖</span> 阅读模式
                </button>
                <button class="mode-btn" data-mode="learning" id="btn-learning">
                    <span class="mode-icon">🧠</span> 学习模式
                </button>
                <div class="mode-slider" id="mode-slider"></div>
            </div>
        </div>
        <div class="header-right">
            <select id="article-select">
                <option value="">选择文章...</option>
            </select>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main id="app-main">
        <!-- 左侧面板：原文 + 音标 -->
        <section class="panel panel-left" id="panel-left">
            <div class="panel-header">
                <h2>原文</h2>
                <div class="panel-actions">
                    <button class="icon-btn" id="btn-font-up" title="增大字号">A+</button>
                    <button class="icon-btn" id="btn-font-down" title="减小字号">A-</button>
                </div>
            </div>
            <div class="panel-content" id="sentences-container">
                <div class="placeholder-msg">
                    <p>📚 请从右上角选择一篇文章</p>
                </div>
            </div>
        </section>

        <!-- 右侧面板：译文 / 分析 -->
        <section class="panel panel-right" id="panel-right">
            <div class="panel-header">
                <h2 id="right-panel-title">译文</h2>
            </div>
            <div class="panel-content" id="right-content">
                <div class="placeholder-msg">
                    <p>📝 选择文章后此处将展示内容</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部音频控制栏 -->
    <footer id="audio-bar" class="hidden">
        <div class="audio-info">
            <span class="audio-label" id="audio-label">准备就绪</span>
            <span class="audio-progress" id="audio-progress"></span>
        </div>
        <div class="audio-controls">
            <button class="audio-btn" id="btn-prev" title="上一句">⏮</button>
            <button class="audio-btn audio-btn-play" id="btn-play" title="播放/暂停">▶</button>
            <button class="audio-btn" id="btn-next" title="下一句">⏭</button>
            <button class="audio-btn" id="btn-loop" title="循环播放">🔁</button>
        </div>
        <audio id="audio-player" preload="auto"></audio>
    </footer>



    <script src="js/app.js?v=6"></script>
</body>

</html>
